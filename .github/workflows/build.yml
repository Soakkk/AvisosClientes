name: Pruebas y ejecutable Windows

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ejecutar pruebas funcionales
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONPATH: .
        run: python scripts/test_full.py

  build:
    needs: tests
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Compilar aplicación
        run: pyinstaller --noconfirm --clean AvisosEMarin.spec
      - name: Construir instalador
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $v = (Select-String -Path avisos/__init__.py -Pattern '__version__\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$v installer/AvisosEMarin.iss
      - name: Calcular SHA-256
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist_installer/AvisosEMarin_Setup_*.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($exe.Name)" | Out-File -Encoding ascii "$($exe.FullName).sha256"
      - name: Subir instalador como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AvisosEMarin-Setup
          path: dist_installer/AvisosEMarin_Setup_*.exe*
      - name: Publicar release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist_installer/AvisosEMarin_Setup_*.exe*
          generate_release_notes: true
